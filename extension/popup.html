<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="popup_title">Comic Translator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      min-width: 300px;
      padding: 14px;
      margin: 0;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .section {
      margin-bottom: 14px;
    }

    .group {
      display: grid;
      gap: 8px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .field label {
      font-weight: 700;
      cursor: default;
    }

    select {
      font-size: 13px;
      padding: 6px 8px;
    }

    .api-input {
      font-size: 13px;
      padding: 6px 8px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .api-input:focus {
      outline: none;
      border-color: rgba(35, 42, 114, 0.6);
    }

    .api-input.is-invalid {
      border-color: #dc322f;
    }

    .api-hint {
      margin-top: 4px;
    }

    .auto-hint {
      margin-top: 4px;
      margin-bottom: 0;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      line-height: 1.35;
    }

    .muted {
      opacity: 0.55;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="title" data-i18n="popup_title">Comic Translator</div>

  <div class="section">
    <label>
      <input type="checkbox" id="enabled">
      <span data-i18n="popup_enabled">Enable extension</span>
    </label>
  </div>

  <div class="section" id="autoSection">
    <label>
      <input type="checkbox" id="autoTranslate">
      <span data-i18n="popup_auto_translate">Auto-translate images on page</span>
    </label>
    <div class="hint auto-hint" data-i18n="popup_auto_hint">
      Translations start automatically without clicking each button.
    </div>
  </div>

  <div class="section" id="modeSection">
    <div style="font-size: 13px; font-weight: 700; margin-bottom: 8px;" data-i18n="popup_mode_title">
      Display mode
    </div>

    <div class="group">
      <label>
        <input type="radio" name="renderMode" value="replace">
        <span data-i18n="popup_mode_replace">Replace — replace original</span>
      </label>

      <label>
        <input type="radio" name="renderMode" value="overlay">
        <span data-i18n="popup_mode_overlay">Overlay — on top of original</span>
      </label>
    </div>

    <div class="field">
      <label for="sourceOcrLang" data-i18n="popup_source_lang">Text language (OCR)</label>
      <select id="sourceOcrLang">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="ch_sim">中文(简体)</option>
        <option value="ch_tra">中文(繁體)</option>
      </select>
    </div>

    <div class="field">
      <label for="targetLang" data-i18n="popup_target_lang">Translate to</label>
      <select id="targetLang">
        <option value="Russian">Русский</option>
        <option value="English">English</option>
        <option value="German">Deutsch</option>
        <option value="French">Français</option>
        <option value="Spanish">Español</option>
        <option value="Japanese">日本語</option>
        <option value="Korean">한국어</option>
        <option value="Simplified Chinese">中文(简体)</option>
        <option value="Traditional Chinese">中文(繁體)</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label for="apiBase" data-i18n="popup_api_base">API server URL</label>
    <input
      type="text"
      id="apiBase"
      class="api-input"
      placeholder="http://127.0.0.1:8000"
      spellcheck="false"
      autocomplete="off"
    />
    <div class="hint api-hint" data-i18n="popup_api_hint">
      Change if your server runs on a different host or port.
    </div>
  </div>

  <div class="hint" data-i18n="popup_hint">
    Text language affects OCR.
    Translation language affects the model output.
  </div>

  <div class="server-status" id="serverStatus">
    <span class="server-status-dot" id="serverStatusDot"></span>
    <span id="serverStatusText" data-i18n="server_checking">Checking…</span>
  </div>

  <style>
    .server-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.04);
    }

    .server-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #999;
      flex: 0 0 auto;
    }

    .server-status.is-ok { background: rgba(46, 160, 67, 0.12); color: #1a6b32; }
    .server-status.is-ok .server-status-dot { background: #2ea043; }
    .server-status.is-error { background: rgba(220, 50, 47, 0.12); color: #8a1f1d; }
    .server-status.is-error .server-status-dot { background: #dc322f; }
  </style>

  <script src="popup.js"></script>
</body>
</html>
